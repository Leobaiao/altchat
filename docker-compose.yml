version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: altchat-postgres
    environment:
      POSTGRES_USER: altchat
      POSTGRES_PASSWORD: altchat
      POSTGRES_DB: altchat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U altchat"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: altchat-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: altchat-api
    environment:
      DATABASE_URL: "postgresql://altchat:altchat@postgres:5432/altchat?schema=public"
      FRONTEND_ORIGIN: "*"
      PORT: 4300
    ports:
      - "4300:4300"
    depends_on:
      postgres:
        condition: service_healthy

  console:
    build:
      context: .
      dockerfile: apps/console/Dockerfile
    container_name: altchat-console
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
  minio_data:
